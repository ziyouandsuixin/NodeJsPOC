<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析结果 - {{ contract_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .markdown-body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .markdown-body h1, 
        .markdown-body h2, 
        .markdown-body h3, 
        .markdown-body h4, 
        .markdown-body h5, 
        .markdown-body h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
        }
        .markdown-body h1 {
            padding-bottom: 0.3em;
            font-size: 2em;
            border-bottom: 1px solid #eaecef;
        }
        .markdown-body h2 {
            padding-bottom: 0.3em;
            font-size: 1.5em;
            border-bottom: 1px solid #eaecef;
        }
        .markdown-body pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: #f6f8fa;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        .markdown-body code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            background-color: rgba(175,184,193,0.2);
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shield-check"></i> 智能合约安全分析工具
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">
                    <i class="bi bi-arrow-left"></i> 返回首页
                </a>
            </div>
        </div>
    </nav>
    
    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>合约分析结果: <span class="text-primary">{{ contract_name }}</span></h1>
            <div class="btn-group">
                <a href="{{ url_for('download_file', result_dir=result_dir, filename='security_report.md') }}" 
                   class="btn btn-outline-primary">
                    <i class="bi bi-download"></i> 下载报告
                </a>
                {% if poc_exists %}
                <a href="{{ url_for('download_file', result_dir=result_dir, filename='exploit_poc.sol') }}" 
                   class="btn btn-outline-primary">
                    <i class="bi bi-download"></i> 下载POC
                </a>
                {% endif %}
                <a href="{{ url_for('download_file', result_dir=result_dir, filename='full_analysis.json') }}" 
                   class="btn btn-outline-primary">
                    <i class="bi bi-download"></i> 下载完整数据
                </a>
            </div>
        </div>
        
        <div class="card shadow mb-4">
            <div class="card-header bg-light">
                <h3 class="mb-0"><i class="bi bi-file-text"></i> 安全分析报告</h3>
            </div>
            <div class="card-body">
                <div id="report-content" class="markdown-body"></div>
            </div>
        </div>
        
        {% if poc_exists %}
        <div class="card shadow">
            <div class="card-header bg-light">
                <h3 class="mb-0"><i class="bi bi-code-slash"></i> 漏洞利用代码 (POC)</h3>
            </div>
            <div class="card-body">
                <pre><code class="language-solidity">// 点击上方"下载POC"按钮获取完整代码</code></pre>
            </div>
        </div>
        {% endif %}
    </div>
    
    <footer class="bg-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">© 2023 智能合约安全分析工具 | 安全可靠的分析平台</p>
        </div>
    </footer>
    
    <script>
        // 将Markdown内容渲染为HTML
        const reportContent = document.getElementById('report-content');
        const markdownContent = `{{ report_content }}`;
        
        // 转换Markdown为HTML
        reportContent.innerHTML = marked.parse(markdownContent);
        
        // 为代码块添加高亮
        document.querySelectorAll('#report-content pre code').forEach((block) => {
            hljs.highlightElement(block);
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
