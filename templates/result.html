<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析结果 - {{ module_name }} - Node.js安全分析工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-brand {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: transform 0.25s ease;
        }
        .navbar-brand:hover {
            transform: scale(1.03);
            text-shadow: 0 2px 6px rgba(255,255,255,0.3);
        }
        .card {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            font-weight: bold;
        }
        .markdown-body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .markdown-body h1, 
        .markdown-body h2, 
        .markdown-body h3, 
        .markdown-body h4, 
        .markdown-body h5, 
        .markdown-body h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
        }
        .markdown-body h1 {
            padding-bottom: 0.3em;
            font-size: 2em;
            border-bottom: 1px solid #eaecef;
        }
        .markdown-body h2 {
            padding-bottom: 0.3em;
            font-size: 1.5em;
            border-bottom: 1px solid #eaecef;
        }
        .markdown-body pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: #f6f8fa;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        .markdown-body code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            background-color: rgba(175,184,193,0.2);
            border-radius: 6px;
        }
        pre {
            background-color: #f6f8fa;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .btn-group .btn {
            margin-left: 5px;
        }
        footer {
            background-color: #f8f9fa;
            border-top: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="/">
                <i class="bi bi-shield-check me-2"></i> Node.js安全分析工具
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link fs-5" href="/">
                    <i class="bi bi-arrow-left"></i> 返回首页
                </a>
            </div>
        </div>
    </nav>
    
    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Node.js分析结果: <span class="text-primary">{{ module_name }}</span></h1>
            <div class="btn-group">
                <a href="{{ url_for('download_result_file', result_dir=result_dir, filename='security_report.md') }}" 
                   class="btn btn-outline-primary">
                    <i class="bi bi-download"></i> 下载报告
                </a>
                {% if poc_exists %}
                <a href="{{ url_for('download_result_file', result_dir=result_dir, filename='exploit_poc.js') }}" 
                   class="btn btn-outline-primary">
                    <i class="bi bi-download"></i> 下载POC
                </a>
                {% endif %}
                <a href="{{ url_for('download_result_file', result_dir=result_dir, filename='full_analysis.json') }}" 
                   class="btn btn-outline-primary">
                    <i class="bi bi-download"></i> 下载完整数据
                </a>
            </div>
        </div>
        
        <div class="card shadow mb-4">
            <div class="card-header bg-light">
                <h3 class="mb-0"><i class="bi bi-file-text"></i> 安全分析报告</h3>
            </div>
            <div class="card-body">
                <div id="report-content" class="markdown-body"></div>
            </div>
        </div>
        
        {% if poc_exists %}
        <div class="card shadow">
            <div class="card-header bg-light">
                <h3 class="mb-0"><i class="bi bi-code-slash"></i> 漏洞利用代码 (POC)</h3>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <i class="bi bi-info-circle"></i> 完整POC代码已生成，点击上方"下载POC"按钮获取
                </div>
                <pre><code class="language-javascript">// POC代码已生成，请下载完整文件
// 文件: exploit_poc.js</code></pre>
            </div>
        </div>
        {% endif %}
    </div>
    
    <footer class="py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">© 2025 Node.js安全分析工具 | 基于RAG的智能代码审计平台</p>
        </div>
    </footer>
    
    <script>
        // 将Markdown内容渲染为HTML
        const reportContent = document.getElementById('report-content');
        const markdownContent = `{{ report_content | safe }}`;
        
        // 转换Markdown为HTML
        if (markdownContent && marked) {
            reportContent.innerHTML = marked.parse(markdownContent);
            
            // 为代码块添加高亮
            setTimeout(() => {
                document.querySelectorAll('#report-content pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }, 100);
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
