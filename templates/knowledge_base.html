<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库分析与POC验证 - 智能合约安全分析工具</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .collapsible-section {
      cursor: pointer;
      padding: 10px;
      background-color: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 5px;
      margin-bottom: 10px;
    }
    .collapsible-content {
      display: none;
      padding: 15px;
      background-color: white;
      border: 1px solid #dee2e6;
      border-top: none;
      border-radius: 0 0 5px 5px;
    }
    pre {
      background-color: #f6f8fa;
      padding: 10px;
      border-radius: 5px;
      overflow-x: auto;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm py-3">
    <div class="container position-relative">

        <!-- 居中的标题 -->
        <div class="mx-auto text-center">
        <a class="navbar-brand fw-bold text-white fs-3" href="#" style="letter-spacing: 1px;">
            <i class="bi bi-shield-check me-2"></i> 智能合约安全分析工具（珞珈之戍）
        </a>
        </div>

        <!-- 右上角按钮（风格与标题统一） -->
        <div class="position-absolute end-0 me-3">
        <button id="toggleViewBtn" class="btn btn-outline-light btn-lg fw-bold px-4 py-2 stylish-btn">
            <i class="bi bi-database-add me-2"></i> 扩充知识库
        </button>
        </div>
    </div>
  </nav>


  <div class="container my-5">
    <!-- 上传区域 -->
    <div class="card shadow-lg mb-4">
        <div class="card-header bg-primary text-white text-center py-4">
            <h2><i class="bi bi-cloud-upload"></i> 上传智能合约与POC</h2>
            <p class="mb-0">上传智能合约和其POC进行漏洞验证和知识库扩充</p>
        </div>
        <div class="card-body p-5">
            <form id="kbForm" enctype="multipart/form-data" class="mb-4">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="contractFile" class="form-label">智能合约文件 (.sol)</label>
                        <input class="form-control" type="file" id="contractFile" name="contract_file" accept=".sol" required>
                    </div>
                    <div class="col-md-6">
                        <label for="pocFile" class="form-label">POC 文件 (.sol)</label>
                        <input class="form-control" type="file" id="pocFile" name="poc_file" accept=".sol" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg">
                    <i class="bi bi-search"></i> 开始分析
                </button>
            </form>

            <!-- 进度指示器 - 增加了更大的底部间距 -->
            <div id="progressContainer" class="mt-4 text-center mb-5" style="display:none;">
                <div class="d-flex justify-content-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">分析中...</span>
                    </div>
                    <div class="ms-3">
                        <h5>分析中，请稍候...</h5>
                        <div class="progress" style="width: 300px; height: 20px;">
                            <div class="progress-bar progress-bar-striped progress-bar-animated" 
                                 style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 使用说明 - 增加了顶部间距 -->
            <div class="alert alert-info mt-4">
                <h5><i class="bi bi-info-circle"></i> 使用说明：</h5>
                <ul class="mb-0">
                    <li>上传您的 Solidity 智能合约文件和该合约的POC文件（.sol 格式）</li>
                    <li>系统将通过POC进行验证识别漏洞是否正确</li>
                    <li>生成详细漏洞验证结果和 Long Term Memory 扩充结果</li>
                    <li>知识库扩充完成后，您可以查看新加入的知识条目</li>
                    <li>支持的文件大小：最大 16MB</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 分析结果 -->
    <div id="resultContainer" style="display:none;">
      <div class="analysis-section">
        <div class="collapsible-section" onclick="toggleSection('rootcauseSection')">
          <h3><i class="bi bi-bug"></i> 根因分析 <span class="badge bg-danger" id="rootcauseBadge">0</span></h3>
        </div>
        <div id="rootcauseSection" class="collapsible-content">
          <div id="rootcauseContent"></div>
        </div>
      </div>

      <div class="analysis-section">
        <div class="collapsible-section" onclick="toggleSection('pocSection')">
          <h3><i class="bi bi-check-circle"></i> POC 验证结果 <span class="badge bg-success" id="pocBadge">0</span></h3>
        </div>
        <div id="pocSection" class="collapsible-content">
          <div id="pocContent"></div>
        </div>
      </div>

      <div class="analysis-section">
        <div class="collapsible-section" onclick="toggleSection('expansionSection')">
          <h3><i class="bi bi-database-add"></i> 知识库扩充结果</h3>
        </div>
        <div id="expansionSection" class="collapsible-content">
          <div id="expansionContent"></div>
        </div>
      </div>
    </div>
  </div>

  <footer class="bg-light py-4 mt-5">
    <div class="container text-center">
      <p class="mb-0">© 2025 智能合约安全分析工具 | POC验证与知识库扩充模块</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
  <script>
    // 折叠
    function toggleSection(id){
      const s=document.getElementById(id);
      s.style.display=s.style.display==='none'?'block':'none';
    }

    document.getElementById('kbForm').addEventListener('submit', async function(e){
      e.preventDefault();
      document.getElementById('progressContainer').style.display='block';
      document.getElementById('resultContainer').style.display='none';

      const fd=new FormData();
      fd.append('contract_file', document.getElementById('contractFile').files[0]);
      fd.append('poc_file', document.getElementById('pocFile').files[0]);

      try{
        const res=await fetch('/knowledge_base/analyze',{method:'POST',body:fd});
        const data=await res.json();
        document.getElementById('progressContainer').style.display='none';
        if(data.success){
          renderResults(data.analysis_result);
          document.getElementById('resultContainer').style.display='block';
          window.scrollTo({top:document.getElementById('resultContainer').offsetTop,behavior:'smooth'});
        } else {
          alert('分析失败：'+data.error);
        }
      }catch(err){
        document.getElementById('progressContainer').style.display='none';
        alert('请求失败：'+err.message);
      }
    });

    function renderResults(res){
      renderRootcause(res.rootcause_analysis);
      renderPOC(res.poc_validation);
      renderExpansion(res.knowledge_base_expansion);
    }

    function renderRootcause(rc){
      const v=rc.final_vulnerability||{};
      const html=`
        <div class="card mb-3">
          <div class="card-header"><h5>发现漏洞</h5></div>
          <div class="card-body">
            <p><b>名称：</b>${v.vulnerability_name||'--'}</p>
            <p><b>原因：</b>${v.reason||'--'}</p>
            <p><b>位置：</b>${v.location||'--'}</p>
            <p><b>触发点：</b>${v.trigger_point||'--'}</p>
            <pre><code class="language-solidity">${v.code_snippet||''}</code></pre>
          </div>
        </div>`;
      document.getElementById('rootcauseContent').innerHTML=html;
      document.getElementById('rootcauseBadge').textContent=v.vulnerability_name?1:0;
      setTimeout(()=>hljs.highlightAll(),100);
    }

    function renderPOC(pv){
      const matched=pv.matched;
      let html='';
      if(matched){
        html+=`<div class="alert alert-success"><h5>✅ 漏洞验证成功</h5><p>${pv.reasoning}</p></div>`;
        const vul=pv.exploited_vulnerability||{};
        if(vul.vulnerability_name){
          html+=`<div class="card"><div class="card-header"><h5>POC 利用漏洞详情</h5></div>
            <div class="card-body"><ul>
            <li><b>漏洞名称：</b>${vul.vulnerability_name}</li>
            <li><b>原因：</b>${vul.reason||'--'}</li>
            <li><b>位置：</b>${vul.location||'--'}</li>
            <li><b>触发点：</b>${vul.trigger_point||'--'}</li>
            </ul></div></div>`;
        }
      }else{
        html+=`<div class="alert alert-danger"><h5>❌ 验证失败</h5><p>${pv.reasoning||'POC未利用给定漏洞'}</p></div>`;
      }
      document.getElementById('pocContent').innerHTML=html;
      document.getElementById('pocBadge').textContent=matched?1:0;
    }

    function renderExpansion(exp){
      let html='';
      if(exp.expanded){
        html+=`<div class="alert alert-info"><h5><i class="bi bi-database-add"></i> 已进行知识库扩充</h5></div>`;
        if(Object.keys(exp.new_rootcause||{}).length){
          html+=`<h6>新 RootCause：</h6><pre>${JSON.stringify(exp.new_rootcause,null,2)}</pre>`;
        }
        if(Object.keys(exp.new_protocol||{}).length){
          html+=`<h6>新 ProtocolType：</h6><pre>${JSON.stringify(exp.new_protocol,null,2)}</pre>`;
        }
        if(Object.keys(exp.update_status||{}).length){
          html+=`<h6>更新状态：</h6><pre>${JSON.stringify(exp.update_status,null,2)}</pre>`;
        }
      }else{
        html+=`<div class="alert alert-success"><h5>未触发知识库扩充</h5><p>漏洞验证成功，无需新增知识点。</p></div>`;
      }
      document.getElementById('expansionContent').innerHTML=html;
    }
    // 动态切换按钮逻辑
  document.addEventListener("DOMContentLoaded", () => {
    const btn = document.getElementById("toggleViewBtn");

    // 判断当前是哪个页面
    const isKnowledgeBase = window.location.pathname.includes("knowledge_base");

    // 根据当前页面调整按钮文案
    btn.innerHTML = isKnowledgeBase
      ? '<i class="bi bi-arrow-left-circle"></i> 返回主分析页面'
      : '<i class="bi bi-database-add"></i> 进入知识库分析';

    // 点击时在当前页面加载另一个页面内容，而不是打开新标签
    btn.addEventListener("click", async () => {
      const target = isKnowledgeBase ? "/" : "/knowledge_base";

      try {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> 加载中...';

        const res = await fetch(target);
        const html = await res.text();

        // 提取主容器部分（避免替换整个页面导致脚本冲突）
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        const newContent = doc.querySelector(".container");

        document.body.scrollTo({ top: 0 });
        document.querySelector(".container").outerHTML = newContent.outerHTML;

        // 修改 URL 不刷新页面
        window.history.pushState({}, "", target);

        // 手动更新按钮状态
        setTimeout(() => location.reload(), 200);
      } catch (err) {
        alert("页面切换失败：" + err.message);
      } finally {
        btn.disabled = false;
      }
    });
  });
  </script>
</body>
</html>
